# Puerto del Servidor Backend
server.port=8080

# Formato de respuesta JSON: usar snake_case en todas las respuestas (CRITICO para el frontend)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Configuracion de Base de Datos Oracle 19c (Docker Interno)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle-db:1521/XEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:SIIT_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SIIT_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuracion de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuracion de Email (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:ajimeneza@sunafil.gob.pe}
spring.mail.password=${SPRING_MAIL_PASSWORD:wvqaygnskfumfoas}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuracion de Entornos (Produccion AWS)
