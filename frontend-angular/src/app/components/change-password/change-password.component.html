<div class="change-pw-wrapper">
  <div class="card-glass glass-card">
    <div class="card-header">
      <i class="bi bi-shield-lock-fill"></i>
      <h2>Actualización de Seguridad</h2>
      <p>Cambie su contraseña para continuar utilizando el sistema.</p>
    </div>

    <form [formGroup]="formularioPassword" (ngSubmit)="enviarFormulario()" class="modern-form">
      <div class="form-group">
        <label>Contraseña Actual</label>
        <input type="password" formControlName="password_actual" class="modern-input" placeholder="Contraseña usada para ingresar">
      </div>

      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input type="password" formControlName="nueva_password" class="modern-input" placeholder="Mínimo 8 caracteres">
        <div *ngIf="formularioPassword.get('nueva_password')?.errors?.['minlength']" class="error-hint">Debe tener al menos 8 caracteres</div>
      </div>

      <div class="form-group">
        <label>Confirmar Nueva Contraseña</label>
        <input type="password" formControlName="confirmar_password" class="modern-input" placeholder="Repita la nueva contraseña">
        <div *ngIf="formularioPassword.hasError('desigual') && formularioPassword.get('confirmar_password')?.touched" class="error-hint">Las contraseñas no coinciden</div>
      </div>

      <div *ngIf="mensajeError" class="error-msg">{{ mensajeError }}</div>

      <button type="submit" [disabled]="formularioPassword.invalid || estaCargando" class="btn-primary">
        {{ estaCargando ? 'ACTUALIZANDO...' : 'ACTUALIZAR CONTRASEÑA' }}
      </button>
    </form>
  </div>
</div>
