<div class="login-container">
  <div class="login-card">
    <div class="logo-container">
      <img src="assets/img/logo-siit.png" alt="SIIT SUNAFIL" class="main-logo">
      <p class="system-subtitle">Sistema de Tickets</p>
      <p>Sistema Informático de Inspección del Trabajo</p>
    </div>

    <form [formGroup]="formularioLogin" (ngSubmit)="enviarFormulario()" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username" 
          placeholder="Ingrese su usuario"
          [class.invalid]="formularioLogin.get('username')?.invalid && formularioLogin.get('username')?.touched"
        >
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-wrapper">
          <input 
            id="password" 
            [type]="mostrarPassword ? 'text' : 'password'" 
            formControlName="password" 
            placeholder="Ingrese su contraseña"
            [class.invalid]="formularioLogin.get('password')?.invalid && formularioLogin.get('password')?.touched"
          >
          <button type="button" class="btn-toggle-pw" (click)="alternarMostrarPassword()">
            <i class="bi" [ngClass]="mostrarPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
      </div>

      <div *ngIf="mensajeError" class="error-message">
        {{ mensajeError }}
      </div>

      <button type="submit" [disabled]="formularioLogin.invalid || estaCargando" class="btn-submit">
        {{ estaCargando ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>
  </div>
</div>
